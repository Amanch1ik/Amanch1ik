name: Update Featured Projects

on:
  push:
    branches: [main]
    paths:
      - "projects.yml"
      - "scripts/update_projects.py"
      - ".github/workflows/update-projects.yml"
  schedule:
    - cron: "17 3 * * *"   # daily at 03:17 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  render:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install pyyaml

      - name: Render projects section
        env:
          # GITHUB_TOKEN — встроенный токен, видит ваши публичные репо и контрибы.
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # PORTFOLIO_PAT — опционально. Personal Access Token с правом `repo` —
          # нужен ТОЛЬКО если хотите, чтобы в списке появлялись приватные репо
          # (имя + языки, без описания). Создаётся один раз:
          # GitHub → Settings → Developer settings → Personal access tokens →
          # Fine-grained tokens → выбрать репо Amanch1ik/Amanch1ik с правом
          # "Metadata: Read" и репозитории которые хотите показывать с правом
          # "Contents: Read", затем добавить в Secrets как PORTFOLIO_PAT.
          PORTFOLIO_PAT: ${{ secrets.PORTFOLIO_PAT }}
        run: python scripts/update_projects.py

      - name: Commit changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: refresh featured projects"
          commit_user_name: Amanchik
          commit_user_email: fredilivegames@gmail.com
          commit_author: "Amanchik <fredilivegames@gmail.com>"
          file_pattern: README.md
